# Create the directory if it doesn't exist
New-Item -ItemType Directory -Path templates\payments -Force

# Create the test file
@"
<!DOCTYPE html>
<html>
<head>
    <title>Test Payment</title>
    <style>
        .pay-now-btn {
            background: #f39c12;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
        .pay-now-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div style="text-align: center; margin-top: 100px;">
        <h2>Test Payment Page</h2>
        <button id="payButton" class="pay-now-btn">💰 Pay Now</button>
    </div>
    
    <script>
    function processPayment() {
        const button = document.getElementById('payButton');
        
        // Change button text
        button.innerText = '⏳ Processing...';
        button.disabled = true;
        
        // Simulate payment after 2 seconds
        setTimeout(function() {
            // Change to Paid
            button.innerText = '✅ Paid';
            button.style.backgroundColor = '#28a745';
            
            // Show alert
            alert('Payment Successful!');
        }, 2000);
    }
    
    // Add click event when page loads
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('payButton').onclick = processPayment;
    });
    </script>
</body>
</html>
"@ | Set-Content -Path templates\payments\test_payment.html
