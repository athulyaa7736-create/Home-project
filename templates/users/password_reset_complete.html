<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Reset Complete - Fixzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
  --navy:      #0f2040;
  --navy2:     #1e3c72;
  --orange:    #f97316;
  --orange-dk: #ea6c0a;
  --orange-lt: #fff7ed;
  --white:     #ffffff;
  --light:     #f4f7fc;
  --muted:     #64748b;
  --border:    #e2e8f0;
  --fH: 'Cabinet Grotesk', sans-serif;
  --fB: 'Figtree', sans-serif;
  --ease: cubic-bezier(.16,1,.3,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: var(--fB);
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
  position: relative;
}

/* ── BG ── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 56px 56px;
  animation: gridMove 30s linear infinite;
}
@keyframes gridMove { from{background-position:0 0} to{background-position:56px 56px} }

.bg-blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
.blob-a { width:500px;height:500px; background:radial-gradient(circle,rgba(249,115,22,.1),transparent 70%); top:-100px;right:-80px; animation:bF 10s ease-in-out infinite; }
.blob-b { width:350px;height:350px; background:radial-gradient(circle,rgba(30,60,114,.5),transparent 70%); bottom:-80px;left:-60px; animation:bF 14s ease-in-out infinite reverse; }
.blob-c { width:280px;height:280px; background:radial-gradient(circle,rgba(249,115,22,.07),transparent 70%); top:50%;left:30%; animation:bF 8s ease-in-out infinite 1.5s; }
@keyframes bF { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.12) translate(15px,-20px)} }

/* ── CARD ── */
.card {
  position: relative; z-index: 1;
  background: var(--white);
  border-radius: 28px;
  padding: 52px 44px 44px;
  width: 100%; max-width: 460px;
  text-align: center;
  box-shadow: 0 32px 80px rgba(0,0,0,.3);
  animation: cardUp .7s var(--ease) both;
  border: 1px solid rgba(255,255,255,.08);
}
@keyframes cardUp {
  from { opacity:0; transform:translateY(32px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── LOGO ── */
.logo {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 36px;
}
.logo-box {
  width: 40px; height: 40px; background: var(--orange);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px;
}
.logo-text {
  font-family: var(--fH); font-size: 25px; font-weight: 900;
  letter-spacing: -1px; color: var(--navy);
}
.logo-text em { color: var(--orange); font-style: normal; }

/* ── ANIMATED SUCCESS ── */
.success-wrap {
  position: relative;
  width: 110px; height: 110px;
  margin: 0 auto 30px;
}
.ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 2px solid rgba(249,115,22,.2);
  animation: ringOut 2.5s ease-out infinite;
}
.ring:nth-child(2) { animation-delay: .7s; }
.ring:nth-child(3) { animation-delay: 1.4s; }
@keyframes ringOut {
  0%   { transform:scale(.7); opacity:.9; }
  100% { transform:scale(1.9); opacity:0; }
}

.success-circle {
  position: absolute; inset: 18px;
  background: linear-gradient(135deg, var(--orange), var(--orange-dk));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 30px;
  box-shadow: 0 10px 32px rgba(249,115,22,.4);
  animation: popIn .6s var(--ease) .2s both;
}
@keyframes popIn {
  from { transform:scale(0) rotate(-30deg); opacity:0; }
  to   { transform:scale(1) rotate(0deg);   opacity:1; }
}

/* ── TITLE ── */
.card-title {
  font-family: var(--fH); font-size: 26px; font-weight: 900;
  letter-spacing: -.8px; color: var(--navy); margin-bottom: 10px;
}

.card-sub {
  font-size: 15px; color: var(--muted); line-height: 1.7;
  margin-bottom: 8px;
}

/* ── SUCCESS BADGE ── */
.success-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 30px; padding: 8px 18px;
  font-size: 13px; font-weight: 700; color: #15803d;
  margin: 10px 0 28px;
}

/* ── WHAT NEXT ── */
.next-card {
  background: var(--light); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px;
  margin-bottom: 28px; text-align: left;
}
.next-title {
  font-family: var(--fH); font-size: 13px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.next-title i { color: var(--orange); }
.next-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; color: #334155;
}
.next-item:last-child { border-bottom: none; padding-bottom: 0; }
.next-item:first-of-type { padding-top: 0; }
.next-ic {
  width: 32px; height: 32px; border-radius: 9px;
  background: var(--orange-lt);
  display: flex; align-items: center; justify-content: center;
  color: var(--orange); font-size: 13px; flex-shrink: 0;
}

/* ── BUTTON ── */
.btn-login {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 15px;
  background: var(--orange); color: #fff;
  border: none; border-radius: 12px;
  font-family: var(--fH); font-size: 16px; font-weight: 800;
  cursor: pointer; transition: all .3s var(--ease);
  text-decoration: none; position: relative; overflow: hidden;
}
.btn-login::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.2), transparent 70%);
  transform: translateX(-100%); transition: transform .5s;
}
.btn-login:hover::after { transform: translateX(100%); }
.btn-login:hover {
  background: var(--orange-dk);
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(249,115,22,.35);
}

/* ── AUTO-REDIRECT ── */
.redirect-bar {
  margin-top: 16px;
  background: var(--light); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--muted);
}
.redirect-count {
  font-family: var(--fH); font-weight: 900;
  font-size: 18px; color: var(--orange);
  min-width: 28px; text-align: center;
}
.redirect-track {
  flex: 1; height: 4px; background: var(--border);
  border-radius: 2px; overflow: hidden;
}
.redirect-fill {
  height: 100%; background: var(--orange);
  border-radius: 2px;
  animation: countdown 5s linear forwards;
}
@keyframes countdown { from{width:100%} to{width:0%} }

/* ── TRUST ── */
.trust-row {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin-top: 24px; padding-top: 20px;
  border-top: 1px solid var(--border);
}
.trust-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #94a3b8; font-weight: 500;
}
.trust-item i { color: var(--orange); font-size: 12px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-blob blob-a"></div>
<div class="bg-blob blob-b"></div>
<div class="bg-blob blob-c"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-box"><i class="fas fa-screwdriver-wrench"></i></div>
    <div class="logo-text">Fix<em>zy</em></div>
  </div>

  <!-- Animated success -->
  <div class="success-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="success-circle">
      <i class="fas fa-check"></i>
    </div>
  </div>

  <!-- Title -->
  <div class="card-title">Password Reset Complete!</div>
  <p class="card-sub">Your password has been changed successfully.</p>

  <div class="success-badge">
    <i class="fas fa-circle-check"></i> Account secured with new password
  </div>

  <!-- What's next -->
  <div class="next-card">
    <div class="next-title"><i class="fas fa-list-check"></i> What's next</div>
    <div class="next-item">
      <div class="next-ic"><i class="fas fa-right-to-bracket"></i></div>
      Log in with your new password
    </div>
    <div class="next-item">
      <div class="next-ic"><i class="fas fa-calendar-check"></i></div>
      Book your home services as usual
    </div>
    <div class="next-item">
      <div class="next-ic"><i class="fas fa-shield-halved"></i></div>
      Keep your password safe and private
    </div>
  </div>

  <!-- Login button -->
  <a href="{% url 'login' %}" class="btn-login" id="loginBtn">
    <i class="fas fa-right-to-bracket"></i> Login Now
  </a>

  <!-- Auto-redirect bar -->
  <div class="redirect-bar">
    <div class="redirect-count" id="countdown">5</div>
    <div class="redirect-track">
      <div class="redirect-fill"></div>
    </div>
    <span>Redirecting to login…</span>
  </div>

  <!-- Trust -->
  <div class="trust-row">
    <div class="trust-item"><i class="fas fa-lock"></i> Secured</div>
    <div class="trust-item"><i class="fas fa-eye-slash"></i> Encrypted</div>
    <div class="trust-item"><i class="fas fa-shield-halved"></i> Protected</div>
  </div>

</div>

<script>
// Auto-redirect countdown
var secs = 5;
var loginUrl = document.getElementById('loginBtn').getAttribute('href');
var tick = setInterval(function () {
  secs--;
  var el = document.getElementById('countdown');
  if (el) el.textContent = secs;
  if (secs <= 0) {
    clearInterval(tick);
    window.location.href = loginUrl;
  }
}, 1000);
</script>

</body>
</html>
