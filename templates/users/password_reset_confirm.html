<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set New Password - Fixzy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root {
  --navy:      #0f2040;
  --navy2:     #1e3c72;
  --orange:    #f97316;
  --orange-dk: #ea6c0a;
  --orange-lt: #fff7ed;
  --white:     #ffffff;
  --light:     #f4f7fc;
  --muted:     #64748b;
  --border:    #e2e8f0;
  --fH: 'Cabinet Grotesk', sans-serif;
  --fB: 'Figtree', sans-serif;
  --ease: cubic-bezier(.16,1,.3,1);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: var(--fB);
  min-height: 100vh;
  background: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overflow-y: auto;
  position: relative;
}

/* ── BG ── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size: 56px 56px;
  animation: gridMove 30s linear infinite;
}
@keyframes gridMove { from{background-position:0 0} to{background-position:56px 56px} }

.bg-blob { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
.blob-a { width:500px;height:500px; background:radial-gradient(circle,rgba(249,115,22,.1),transparent 70%); top:-100px;right:-80px; animation:bF 10s ease-in-out infinite; }
.blob-b { width:350px;height:350px; background:radial-gradient(circle,rgba(30,60,114,.5),transparent 70%); bottom:-80px;left:-60px; animation:bF 14s ease-in-out infinite reverse; }
@keyframes bF { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.12) translate(15px,-20px)} }

/* ── CARD ── */
.card {
  position: relative; z-index: 1;
  background: var(--white);
  border-radius: 28px;
  padding: 48px 44px;
  width: 100%; max-width: 460px;
  box-shadow: 0 32px 80px rgba(0,0,0,.3);
  animation: cardUp .7s var(--ease) both;
  border: 1px solid rgba(255,255,255,.08);
}
@keyframes cardUp {
  from { opacity:0; transform:translateY(32px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── LOGO ── */
.logo {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 32px;
}
.logo-box {
  width: 40px; height: 40px; background: var(--orange);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px;
}
.logo-text {
  font-family: var(--fH); font-size: 25px; font-weight: 900;
  letter-spacing: -1px; color: var(--navy);
}
.logo-text em { color: var(--orange); font-style: normal; }

/* ── ICON ── */
.icon-wrap {
  width: 72px; height: 72px;
  background: var(--orange-lt);
  border: 2px solid rgba(249,115,22,.2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  font-size: 28px; color: var(--orange);
  animation: iconPop .5s var(--ease) .3s both;
}
@keyframes iconPop {
  from { transform:scale(0); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}

/* ── HEADER ── */
.card-title {
  font-family: var(--fH); font-size: 24px; font-weight: 900;
  letter-spacing: -.8px; color: var(--navy);
  text-align: center; margin-bottom: 6px;
}
.card-sub {
  font-size: 14px; color: var(--muted);
  text-align: center; line-height: 1.65; margin-bottom: 28px;
}

/* ── FORM FIELDS — override Django's form.as_p ── */
/* wrap each <p> Django generates */
form p {
  margin-bottom: 18px;
}
form p label {
  display: block; margin-bottom: 6px;
  font-size: 13px; font-weight: 600; color: var(--navy);
}
form p input[type="password"],
form p input[type="text"] {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 11px;
  font-size: 14px; font-family: var(--fB); color: var(--navy);
  background: var(--light); outline: none;
  transition: all .22s var(--ease);
  appearance: none;
}
form p input:focus {
  border-color: var(--orange); background: var(--white);
  box-shadow: 0 0 0 3px rgba(249,115,22,.1);
}
form p input::placeholder { color: #94a3b8; }

/* help text Django adds */
form p .helptext,
form p span.helptext {
  display: block; font-size: 11px; color: #94a3b8;
  margin-top: 5px; line-height: 1.5;
}

/* error list Django adds */
form p ul.errorlist {
  list-style: none; margin: 6px 0 0;
}
form p ul.errorlist li {
  font-size: 12px; color: #dc2626;
  display: flex; align-items: center; gap: 5px;
}
form p ul.errorlist li::before { content: '⚠'; font-size: 11px; }

/* ── PASSWORD STRENGTH ── */
.pwd-strength-wrap { margin-top: 10px; margin-bottom: 18px; }
.pwd-label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  margin-bottom: 6px; display: flex; justify-content: space-between;
}
.pwd-label span { color: var(--navy); }
.strength-track {
  display: flex; gap: 4px;
}
.strength-seg {
  flex: 1; height: 5px; border-radius: 3px;
  background: var(--border); transition: background .3s;
}

/* ── RULES ── */
.pwd-rules {
  background: var(--light); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;
}
.rule {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #94a3b8; padding: 3px 0;
  transition: color .3s;
}
.rule i { font-size: 11px; width: 14px; }
.rule.ok { color: #15803d; }
.rule.ok i { color: #22c55e; }

/* ── BUTTON ── */
.btn-submit {
  width: 100%; padding: 14px;
  background: var(--orange); color: #fff;
  border: none; border-radius: 12px;
  font-family: var(--fH); font-size: 16px; font-weight: 800;
  cursor: pointer; transition: all .3s var(--ease);
  display: flex; align-items: center; justify-content: center; gap: 10px;
  position: relative; overflow: hidden;
}
.btn-submit::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.2), transparent 70%);
  transform: translateX(-100%); transition: transform .5s;
}
.btn-submit:hover::after { transform: translateX(100%); }
.btn-submit:hover {
  background: var(--orange-dk);
  transform: translateY(-2px);
  box-shadow: 0 14px 36px rgba(249,115,22,.35);
}

/* ── FOOTER ── */
.card-footer {
  text-align: center; font-size: 13px; color: var(--muted);
  margin-top: 20px;
}
.card-footer a {
  color: var(--orange); font-weight: 700; text-decoration: none;
}
.card-footer a:hover { color: var(--orange-dk); text-decoration: underline; }

/* trust */
.trust-row {
  display: flex; align-items: center; justify-content: center;
  gap: 20px; margin-top: 24px; padding-top: 20px;
  border-top: 1px solid var(--border);
}
.trust-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; color: #94a3b8; font-weight: 500;
}
.trust-item i { color: var(--orange); font-size: 12px; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-blob blob-a"></div>
<div class="bg-blob blob-b"></div>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-box"><i class="fas fa-screwdriver-wrench"></i></div>
    <div class="logo-text">Fix<em>zy</em></div>
  </div>

  <!-- Icon -->
  <div class="icon-wrap">
    <i class="fas fa-lock-open"></i>
  </div>

  <!-- Header -->
  <div class="card-title">Set New Password</div>
  <p class="card-sub">Almost there! Create a strong new password to secure your Fixzy account.</p>

  <!-- Password strength bar -->
  <div class="pwd-strength-wrap">
    <div class="pwd-label">Password strength <span id="strengthLabel">—</span></div>
    <div class="strength-track">
      <div class="strength-seg" id="seg1"></div>
      <div class="strength-seg" id="seg2"></div>
      <div class="strength-seg" id="seg3"></div>
      <div class="strength-seg" id="seg4"></div>
    </div>
  </div>

  <!-- Rules checklist -->
  <div class="pwd-rules">
    <div class="rule" id="r-len"><i class="fas fa-circle"></i> At least 8 characters</div>
    <div class="rule" id="r-upper"><i class="fas fa-circle"></i> One uppercase letter</div>
    <div class="rule" id="r-num"><i class="fas fa-circle"></i> One number</div>
    <div class="rule" id="r-special"><i class="fas fa-circle"></i> One special character</div>
  </div>

  <!-- Django form -->
  <form method="post" novalidate id="pwdForm">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-submit">
      <i class="fas fa-shield-halved"></i> Change Password
    </button>
  </form>

  <div class="card-footer">
    Remember your password? <a href="{% url 'login' %}">Login here</a>
  </div>

  <!-- Trust -->
  <div class="trust-row">
    <div class="trust-item"><i class="fas fa-lock"></i> Encrypted</div>
    <div class="trust-item"><i class="fas fa-eye-slash"></i> Never stored plain</div>
    <div class="trust-item"><i class="fas fa-shield-halved"></i> Secure</div>
  </div>

</div>

<script>
// Find the first password input Django renders
function getFirstPwd() {
  const form = document.getElementById('pwdForm');
  return form ? form.querySelector('input[type="password"]') : null;
}

const segs   = ['seg1','seg2','seg3','seg4'].map(id => document.getElementById(id));
const label  = document.getElementById('strengthLabel');
const rules  = {
  len:     document.getElementById('r-len'),
  upper:   document.getElementById('r-upper'),
  num:     document.getElementById('r-num'),
  special: document.getElementById('r-special'),
};
const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
const labels = ['Weak','Fair','Good','Strong'];

function setRule(el, ok) {
  if (!el) return;
  el.classList.toggle('ok', ok);
  el.querySelector('i').className = ok ? 'fas fa-check-circle' : 'fas fa-circle';
}

function evaluate(v) {
  const checks = {
    len:     v.length >= 8,
    upper:   /[A-Z]/.test(v),
    num:     /[0-9]/.test(v),
    special: /[^A-Za-z0-9]/.test(v),
  };
  Object.keys(checks).forEach(k => setRule(rules[k], checks[k]));
  const score = Object.values(checks).filter(Boolean).length;
  segs.forEach((s, i) => {
    s.style.background = i < score ? colors[score - 1] : '';
  });
  label.textContent = score ? labels[score - 1] : '—';
  label.style.color = score ? colors[score - 1] : '#94a3b8';
}

window.addEventListener('DOMContentLoaded', function () {
  const pwd = getFirstPwd();
  if (pwd) pwd.addEventListener('input', e => evaluate(e.target.value));
});
</script>

</body>
</html>
