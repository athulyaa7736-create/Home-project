{% extends "admin/base.html" %}
{% load static %}

{% block extrahead %}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        .fa, .fas, .far {
            font-family: "Font Awesome 6 Free";
        }
    </style>
{% endblock %}

{% block branding %}
    <h1 id="site-name">
        <i class="fas fa-tools" style="color: #4ecdc4;"></i> 
        Fixzy Admin Portal
    </h1>
{% endblock %}

{% block userlinks %}
    <a href="{% url 'user_dashboard' %}" class="back-to-site-btn">
        <i class="fas fa-house" style="font-size:11px;"></i> Back to Site/
    </a>
    {{ block.super }}
{% endblock %}
